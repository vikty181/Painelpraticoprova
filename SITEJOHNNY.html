        #splash-screen {

            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; transition: 0.8s;
        }
        #splash-screen::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: -1;
        }
        .start-btn {
            background: transparent; border: 3px solid var(--neon-blue); color: var(--neon-blue);

        }
        .start-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 50px var(--neon-blue); }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;

        }

            position: relative; z-index: 1; width: 98vw; height: 95vh;
            display: grid; grid-template-columns: 1fr 380px; 
            grid-template-rows: 1fr 100px; gap: 15px;
            visibility: hidden;
        }

                { q: "Computação Quântica promete:", a: "d", options: { a: "Processadores que esquentam mais", b: "O fim dos jogos", c: "Navegação por satélite antiga", d: "Poder de processamento imensamente superior", e: "Funcionar a base de pilhas" } },
                { q: "O que é Biometria?", a: "a", options: { a: "Identificação por características físicas (digital, face)", b: "Um exame de sangue digital", c: "Medir o tamanho do PC", d: "Uma marca de tênis", e: "Senha de 4 dígitos" } },
                { q: "O Futuro da Educação (EdTech) envolve:", a: "b", options: { a: "Apenas livros de papel", b: "Plataformas personalizadas e gamificação", c: "O fim das escolas", d: "Proibir o uso de internet", e: "Voltar a usar máquinas de escrever" } },
                { q: "O que faz um Algoritmo de Recomendação?", a: "c", options: { a: "Apaga suas fotos", b: "Desliga o celular", c: "Sugere conteúdo baseado no seu perfil", d: "Aumenta o brilho da tela", e: "Limpa o histórico" } },
                { q: "A Singularidade Tecnológica é o conceito de:", a: "d", options: { a: "Um computador que só faz uma coisa", b: "O fim da energia elétrica", c: "A volta ao passado", d: "IA superando a inteligência humana", e: "Usar apenas um cabo" } }
            ]
        };

        let currentIdx = 0;
        let userAnswers = {};
        let activeQuizPool = [];
        const screen = document.getElementById('display-screen');

        function render() {
            const data = slides[currentIdx];
            if (!data) return;
            screen.innerHTML = `<h2>${data.title}</h2><div class="explanation-box">${data.content.map(i => `<div class="content-item">${i}</div>`).join('')}</div>`;
            updateActiveBtn();
        }

        function startQuiz(blockNum) {
            activeQuizPool = blockNum === 'ALL' ? [...bank[1], ...bank[2], ...bank[3]] : bank[blockNum];
            userAnswers = {};
            showQuizMap();
        }

        function showQuizMap() {
            screen.innerHTML = `<h2>MODO PROVA</h2><div class="q-grid" id="quiz-grid"></div><button class="prova-btn" onclick="finishQuiz()">FINALIZAR</button>`;
            const grid = document.getElementById('quiz-grid');
            activeQuizPool.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = `q-btn ${userAnswers[i] ? 'answered' : ''}`;
                btn.innerText = (i + 1);
                btn.onclick = () => showQuestion(i);
                grid.appendChild(btn);
            });
        }

        function showQuestion(idx) {
            const q = activeQuizPool[idx];
            screen.innerHTML = `<h3>QUESTÃO ${idx+1}</h3><p style="font-size:1.3rem;">${q.q}</p>${Object.entries(q.options).map(([k,v]) => `<button class="option-btn ${userAnswers[idx]===k?'selected':''}" onclick="selectOpt(${idx},'${k}')">${k}) ${v}</button>`).join('')}
            <div style="display:flex; gap:10px; margin-top:20px;"><button class="prova-btn" style="border-color:#fff" onclick="showQuizMap()">MAPA</button>${idx < activeQuizPool.length-1 ? `<button class="prova-btn" onclick="showQuestion(${idx+1})">PRÓXIMA</button>` : ''}</div>`;
        }

        function selectOpt(qIdx, opt) { userAnswers[qIdx] = opt; showQuestion(qIdx); }

        function finishQuiz() {
            let hits = 0;
            activeQuizPool.forEach((q, i) => { if(userAnswers[i] === q.a) hits++; });
            screen.innerHTML = `<h1>NOTA FINAL: ${((hits/activeQuizPool.length)*10).toFixed(1)}</h1><p>Acertos: ${hits} de ${activeQuizPool.length}</p><button class="prova-btn" onclick="location.reload()">REINICIAR SISTEMA</button>`;
        }

        function adminLogin() {
            if(prompt("SENHA DO PROFESSOR:") === "PROFJOHNNY") startQuiz('ALL');
        }

        function buildGrids() {
            for(let i=0; i<30; i++) {
                const btn = document.createElement('button');
                btn.className = 'nav-btn'; btn.innerText = (i+1);
                btn.onclick = () => { currentIdx = i; render(); };
                btn.id = `btn-${i}`;
                if(i < 10) document.getElementById('grid-1').appendChild(btn);
                else if(i < 20) document.getElementById('grid-2').appendChild(btn);
                else document.getElementById('grid-3').appendChild(btn);
            }
        }

        function updateActiveBtn() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${currentIdx}`)) document.getElementById(`btn-${currentIdx}`).classList.add('active');
        }

        function next() { if(currentIdx < 29) { currentIdx++; render(); } }
        function prev() { if(currentIdx > 0) { currentIdx--; render(); } }

        buildGrids();
    </script>
</body>
</html>
